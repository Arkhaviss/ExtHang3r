<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExtHang3r</title>
  <link rel="shortcut icon" type="image/png" href="https://raw.githubusercontent.com/Blobby-Boi/ExtHang3r/main/favicon.png">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Varela+Round&display=swap">
  <style>
    body {
      font-family: 'Varela Round', sans-serif;
      margin: 0;
      padding: 0;
      background-color: black; /* Change background to black */
      color: white; /* Change text color to white */
      display: none; /* Hide the content initially */
    }
    header {
      background-color: #343a40;
      color: #fff;
      padding: 10px 20px;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }
    .logo {
      width: 50px;
      height: 50px;
      margin-right: 10px;
    }
    .container {
      max-width: 800px;
      margin: 150px auto 0 auto;
      padding: 20px;
      text-align: center;
      background: #fff;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      display: inline-block; /* Center the container */
    }
    input[type="password"] {
      padding: 10px;
      font-size: 16px;
      border: 1px solid #ced4da;
      border-radius: 4px;
      width: 100%;
      margin-bottom: 10px;
    }
    button {
      font-family: 'Varela Round', sans-serif;
      background-color: #007bff;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      margin-top: 10px;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #0056b3;
    }
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      color: #fff;
      font-size: 24px;
      user-select: none;
      flex-direction: column;
    }
    .spinner {
      border: 6px solid rgba(255, 255, 255, 0.3);
      border-top: 6px solid #fff;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    #killExtensionText {
      display: none;
      margin-top: 20px;
      color: #333;
      font-size: 18px;
      text-align: center;
      background: #e9ecef;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    #killButton {
      display: none;
      background-color: #dc3545;
      color: #fff;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 5px;
      transition: background-color 0.3s ease;
    }
    #killButton:hover {
      background-color: #9c1c28;
    }
    footer {
      background-color: #343a40;
      color: #fff;
      text-align: center;
      padding: 10px;
      position: fixed;
      bottom: 0;
      width: 100%;
    }
    footer a {
      color: #007bff;
      text-decoration: none;
    }
    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

<header>
  <img src="https://blobby-boi.github.io/BlobbypassXSS/favicon.png" alt="Logo" class="logo">
  <h1>ExtHang3r</h1>
</header>

<div class="container" id="passwordContainer">
  <h2>Please Enter Your Password</h2>
  <input type="password" id="passwordInput" placeholder="Enter password">
  <button onclick="checkPassword()">Submit</button>
</div>

<div class="container" id="mainContent">
  <p>ExtHang3r is an exploit that allows ChromeOS users to kill managed extensions after the LTMEAT patch. It remains unpatched in all new ChromeOS versions as of September 2024.</p>
  <label for="iframeSelect" id="labelForIframeSelect">Select extension:</label>
  <select id="iframeSelect"></select>
  <button onclick="warning();" id="hangButton">Hang Extension!</button>
  <button id="killButton" onclick="openExtensionPopup();">Kill Extension!</button>
</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  Hanging... (This will take about 1 minute)
</div>
<div id="killExtensionText"></div>

<footer>
  <p>Made by <a href="https://discord.gg/29W9xf4fUg">Arkhavis</a></p>
</footer>

<script>
  const correctPassword = "yourPassword"; // Replace with your actual password

  function checkPassword() {
    const passwordInput = document.getElementById("passwordInput").value;
    if (passwordInput === correctPassword) {
      document.body.style.display = "block"; // Show content if password is correct
      document.getElementById("passwordContainer").style.display = "none"; // Hide password prompt
      populateSelectOptions(); // Call the function to populate select options
    } else {
      alert("Incorrect password. Access denied.");
      document.getElementById("passwordInput").value = ""; // Reset the input field
    }
  }

  async function checkExtensionURL(url) {
    try {
      const response = await fetch(url);
      return response.ok;
    } catch (error) {
      return false;
    }
  }

  async function populateSelectOptions() {
    const selectElement = document.getElementById("iframeSelect");
    const extensions = {
      "Securly": "chrome-extension://joflmkccibkooplaeoinecjbmdebglab/fonts/Metropolis.css",
      "Securly (old)": "chrome-extension://iheobagjkfklnlikgihanlhcddjoihkg/fonts/Metropolis.css",
      "GoGuardian": "chrome-extension://haldlgldplgnggkjaafhelgiaglafanh/youtube_injection.js",
      "LANSchool": "chrome-extension://baleiojnjpgeojohhhfbichcodgljmnj/blocked.html",
      "Linewize": "chrome-extension://ddfbkhpmcdbciejenfcolaaiebnjcbfc/background/assets/pages/default-blocked.html",
      "Blocksi": "chrome-extension://ghlpmldmjjhmdgmneoaibbegkjjbonbk/pages/blockPage.html",
      "FortiGuard": "chrome-extension://igbgpehnbmhgdgjbhkkpedommgmfbeao/youtube_injection.js",
      "Cisco Umbrella": "chrome-extension://jcdhmojfecjfmbdpchihbeilohgnbdci/blocked.html",
      "ContentKeeper": "chrome-extension://jdogphakondfdmcanpapfahkdomaicfa/img/ckauth19x.png",
      "CK-Authenticator G3": "chrome-extension://odoanpnonilogofggaohhkdkdgbhdljp/img/ckauth19x.png",
      "Securly Classroom": "chrome-extension://jfbecfmiegcjddenjhlbhlikcbfmnafd/notfound.html",
      "Hapara": "chrome-extension://kbohafcopfpigkjdimdcdgenlhkmhbnc/blocked.html",
      "Hapara (new ID)": "chrome-extension://aceopacgaepdcelohobicpffbbejnfac/blocked.html",
      "iboss": "chrome-extension://kmffehbidlalibfeklaefnckpidbodff/restricted.html",
      "Lightspeed Filter Agent": "chrome-extension://adkcpkpghahmbopkjchobieckeoaoeem/icon.png",
      "Lightspeed Rocket": "chrome-extension://jbcglmhfaahlodfdphgghpdgpkfhmhcb/page/resources/img/balloons.png",
      "Netsweeper": "chrome-extension://eophdnkkhgjjgkijcjlknkdlhldgkmib/whats_new.png",
      "Smoothwall": "chrome-extension://ilebpcoanlkijgchdoeoedbjjgogijgd/blocked.html",
      "iBoss (new ID)": "chrome-extension://gfcfkbknljhncfejflblodgafidhngkh/img/ckauth19x.png",
    };

    for (const [name, url] of Object.entries(extensions)) {
      const isValid = await checkExtensionURL(url);
      if (isValid) {
        const option = document.createElement("option");
        option.value = url;
        option.textContent = name;
        selectElement.appendChild(option);
      }
    }
  }

  function warning() {
    if (document.getElementById("iframeSelect").value === "") {
      alert("Please select an extension to hang.");
    } else {
      const hangButton = document.getElementById("hangButton");
      hangButton.disabled = true; // Disable hang button to prevent multiple clicks
      const selectedExtension = document.getElementById("iframeSelect").value;
      const overlay = document.getElementById("overlay");
      overlay.style.display = "flex"; // Show overlay

      // Simulate hanging the extension
      setTimeout(() => {
        overlay.style.display = "none"; // Hide overlay after hanging
        document.getElementById("killButton").style.display = "block"; // Show kill button
        document.getElementById("killExtensionText").style.display = "block"; // Show the text for killing extension
        document.getElementById("killExtensionText").textContent = `Extension hung: ${selectedExtension}`;
      }, 10000); // Simulate hang for 10 seconds
    }
  }

  function openExtensionPopup() {
    const selectedExtension = document.getElementById("iframeSelect").value;
    window.open(selectedExtension, '_blank'); // Open the selected extension in a new tab
  }

  // Add event listeners to buttons
  document.getElementById("killButton").addEventListener("click", openExtensionPopup);
</script>

</body>
</html>
